<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkPoint | Secure Parking in Hatiara,jhill bagan, Kolkata</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }

body {
    background: #0f172a;
    color: white;
}

header {
    position: fixed;
    width: 100%;
    padding: 20px 10%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 { color: #00f5d4; }

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: 500;
}

.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to right, #0f172a, #1e293b);
    text-align: center;
    animation: fadeIn 2s ease-in;
}

.hero h2 {
    font-size: 3rem;
    color: #00f5d4;
}

.hero p {
    margin-top: 15px;
    font-size: 1.2rem;
}

.button {
    margin-top: 25px;
    padding: 12px 30px;
    background: #00f5d4;
    color: black;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.button:hover {
    background: #00bbf9;
    transform: scale(1.05);
}

.section {
    padding: 100px 10%;
    text-align: center;
}

.card-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 30px;
    margin: 15px;
    border-radius: 15px;
    width: 250px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    background: #334155;
}

form {
    max-width: 400px;
    margin: auto;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

iframe {
    width: 100%;
    height: 400px;
    border-radius: 15px;
}

footer {
    padding: 20px;
    text-align: center;
    background: #020617;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<header>
    <h1>ParkPoint</h1>
    <nav>
        <a href="#features">Features</a>
        <a href="#booking">Book</a>
        <a href="#location">Location</a>
        <a href="login.html">Admin</a>
    </nav>
</header>

<section class="hero">
    <h2>Premium Secure Parking</h2>
    <p>24/7 Smart Car Parking in Hatiara, Kolkata</p>
    <a href="#booking"><button class="button">Reserve Now</button></a>
</section>

<section id="features" class="section">
    <h2>Why Choose ParkPoint?</h2>
    <div class="card-container">
        <div class="card">24/7 CCTV Security</div>
        <div class="card">Online Booking</div>
        <div class="card">Affordable Rates</div>
        <div class="card">Easy Access Location(near Newtown)</div>
    </div>
</section>

<section id="booking" class="section">
    <h2>Book Parking</h2>
    <form onsubmit="saveBooking(event)">
        <input type="text" placeholder="Full Name" required>
        <input type="text" placeholder="Vehicle Number" required>
        <select>
            
            <option>Daily</option>
            <option>Monthly</option>
        </select>
        <input type="date" required>
        <button type="submit" class="button">Submit Booking</button>
    </form>
</section>

<section id="location" class="section">
    <h2>Find Us</h2>
    <!-- Replace src with your exact Google Maps embed link -->
    <iframe src="https://www.google.com/maps?q=Hatiara,jhill bagan,Kolkata&output=embed"></iframe>
</section>

<footer>
    © 2026 ParkPoint | Hatiara, Kolkata
</footer>

<script>
function saveBooking(e) {
    e.preventDefault();
    const form = e.target;
    const booking = {
        name: form[0].value,
        vehicle: form[1].value,
        type: form[2].value,
        date: form[3].value
    };
    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
    bookings.push(booking);
    localStorage.setItem("bookings", JSON.stringify(bookings));
    alert("Booking Saved Successfully!");
    form.reset();
}
</script>

</body>

</html>
